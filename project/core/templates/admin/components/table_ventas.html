{% load unfold %}

<div class="{% if card_included == 1 %}-m-6{% else %}lg:border lg:rounded-md lg:shadow-sm{% endif %} overflow-x-auto lg:dark:border-gray-800">
    <table class="block border-gray-200 border-spacing-none border-separate w-full lg:table"
        x-data="{title:'', items:[], fecha:''}"
    >
        
            <thead class="text-gray-900 dark:text-gray-100">
                <tr class="bg-gray-50 dark:bg-white/[.02]">
                    <th class="align-middle font-semibold py-2 text-left text-sm whitespace-nowrap sortable column-description hidden px-3 lg:table-cell {% if card_included == 1 %}first:pl-6 last:pr-6{% endif %}">
                        Ventas
                    </th>
                    <th>accion</th>
                </tr>
            </thead>

            <tbody class="block lg:table-row-group">
                {% for venta in table_context %}
                    <tr 
                    x-data="{ventaItems:[
                                {% for item in venta.items.all %}
                                    {
                                        'nombre': '{{item.producto.nombre}}',
                                        'precio':'{{item.precio}}',
                                        'cantidad':'{{item.cantidad}}',
                                        'total':'{{item.total}}',
                                    },
                                {% endfor %}
                                ],
                            
                            }"
                    class="{% if striped == 1 %}{% cycle '' 'bg-gray-50 dark:bg-white/[.02]' %}{% endif %} block {% if not card_included == 1 %}border mb-3 rounded-md shadow-sm{% else %}border-t{% endif %} lg:table-row lg:border-none lg:mb-0 lg:shadow-none dark:border-gray-800">
                            <td class="px-3 py-2 align-middle flex border-t border-gray-200 font-normal gap-4 min-w-0 overflow-hidden text-left before:flex before:capitalize before:content-[attr(data-label)] before:items-center before:mr-auto first:border-t-0 lg:before:hidden lg:first:border-t lg:py-3 lg:table-cell dark:border-gray-800 {% if card_included == 1 %}lg:first:pl-6 lg:last:pr-6{% endif %}" 
                            data-label="Ventas">
                                {{venta}}
                            </td>
                            <td class="px-3 py-2 align-middle flex border-t border-gray-200 font-normal gap-4 min-w-0 overflow-hidden text-left before:flex before:capitalize before:content-[attr(data-label)] before:items-center before:mr-auto first:border-t-0 lg:before:hidden lg:first:border-t lg:py-3 lg:table-cell dark:border-gray-800 {% if card_included == 1 %}lg:first:pl-6 lg:last:pr-6{% endif %}" 
                            data-label="Detalhes"
                            >
                                <div x-data="{modalIsOpen: false}">
                                    <button @click="modalIsOpen = true; title='{{venta.total}}'; fecha='{{venta.fecha_corta}}',items=ventaItems"
                     
                                    
                                    type="button" class=" text-gray-800 cursor-pointer whitespace-nowrap rounded text-center text-sm font-medium tracking-wide transition hover:opacity-75 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-700 active:opacity-100 active:outline-offset-0 dark:bg-sky-600 dark:text-white dark:focus-visible:outline-sky-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
                                          </svg>
                                    </button>
                                    <div x-cloak x-show="modalIsOpen" x-transition.opacity.duration.200ms x-trap.inert.noscroll="modalIsOpen" @keydown.esc.window="modalIsOpen = false" @click.self="modalIsOpen = false" class="fixed inset-0 z-30 flex items-end justify-center bg-black/20 p-4 pb-8 backdrop-blur-md sm:items-center lg:p-8" role="dialog" aria-modal="true" aria-labelledby="defaultModalTitle">
                                        <!-- Modal Dialog -->
                                        <div x-show="modalIsOpen" x-transition:enter="transition ease-out duration-200 delay-100 motion-reduce:transition-opacity" x-transition:enter-start="opacity-0 scale-50" x-transition:enter-end="opacity-100 scale-100" class="flex max-w-lg flex-col gap-4 overflow-hidden rounded border border-zinc-300 bg-zinc-50 text-neutral-600 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-200">
                                            <!-- Dialog Header -->
                                            <div class="flex items-center justify-between border-b border-zinc-300 bg-zinc-100/60 p-4 dark:border-zinc-700 dark:bg-zinc-900/20">
                                                <h3 id="defaultModalTitle" class="font-semibold tracking-wide text-center text-neutral-900 dark:text-zinc-50" >
                                                    <span>Venda por R$ </span><span x-text="title"></span>
                                                </h3>
                                                <button @click="modalIsOpen = false" aria-label="close modal">
                                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" fill="none" stroke-width="1.4" class="w-5 h-5">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                                                    </svg>
                                                </button>
                                            </div>
                                            <!-- Dialog Body -->
                                            <div class="p-4">
                                                <p>Venda Realizada no dia <span class="font-semibold" x-text="fecha"></span></p> 
                                                <p>
                                                    A continução se presentan os artigos incluidos nesta venda 
                                                </p>
                                                <div class="mt-2 flex font-semibold justify-between gap-1 rounded p-2 bg-gray-200">
                                                    <p>Nome</p>
                                                    <p>Qtd</p>
                                                    <p>Valor</p>
                                                    <p>Total</p>
                                                </div>
                                                <template x-for="item in items">
                                                    <div class="flex justify-between gap-1 rounded p-2 bg-gray-200">
                                                        <p x-text="item.cantidad"></p>
                                                        <p x-text="item.nombre"></p>
                                                        <p x-text="item.precio"></p>
                                                        <p x-text="item.total"></p>
                                                    </div>
                                                </template>

                                            </div>
                                            <!-- Dialog Footer -->
                                            <div class="flex flex-col-reverse justify-between gap-2 border-t border-zinc-300 bg-zinc-100/60 p-4 dark:border-zinc-700 dark:bg-zinc-900/20 sm:flex-row sm:items-center md:justify-end">
                                                <button @click="modalIsOpen = false" type="button" class="cursor-pointer whitespace-nowrap rounded px-4 py-2 text-center text-sm font-medium tracking-wide text-neutral-600 transition hover:opacity-75 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-700 active:opacity-100 active:outline-offset-0 dark:text-zinc-200 dark:focus-visible:outline-sky-600">Remind me later</button>
                                                <button @click="modalIsOpen = false" type="button" class="cursor-pointer whitespace-nowrap rounded bg-sky-700 px-4 py-2 text-center text-sm font-medium tracking-wide text-white transition hover:opacity-75 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-700 active:opacity-100 active:outline-offset-0 dark:bg-sky-600 dark:text-white dark:focus-visible:outline-sky-600">Upgrade Now</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                            </td>
                    </tr>
                {% endfor %}
            </tbody>
    </table>
</div>
